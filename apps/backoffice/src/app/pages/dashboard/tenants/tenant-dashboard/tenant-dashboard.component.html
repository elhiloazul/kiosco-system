<!-- Header -->
<div class="h-16 bg-white border-b border-slate-200 shadow-sm flex items-center px-8 shrink-0">
  @if (tenant()) {
    <div>
      <h1 class="text-sm font-semibold text-slate-900">{{ tenant()!.name }}</h1>
      <p class="text-xs text-slate-400">Resumen del tenant</p>
    </div>
  }
</div>

<!-- Content -->
<div class="flex-1 overflow-y-auto p-8">
  @if (tenant()) {
    <!-- Info card -->
    <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-6 max-w-2xl">
      <div class="flex items-center gap-4 mb-6">
        @if (tenant()!.logoUrl) {
          <img
            [src]="tenant()!.logoUrl"
            [alt]="tenant()!.name"
            class="w-14 h-14 rounded-full object-cover border border-slate-200"
          />
        } @else {
          <div class="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 text-xl font-bold">
            {{ tenant()!.name.charAt(0).toUpperCase() }}
          </div>
        }
        <div>
          <h2 class="text-lg font-bold text-slate-900">{{ tenant()!.name }}</h2>
          <span
            class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-medium mt-1"
            [class]="tenant()!.isActive
              ? 'bg-emerald-50 text-emerald-700'
              : 'bg-slate-100 text-slate-500'"
          >
            <span
              class="w-1.5 h-1.5 rounded-full"
              [class]="tenant()!.isActive ? 'bg-emerald-500' : 'bg-slate-400'"
            ></span>
            {{ tenant()!.isActive ? 'Activo' : 'Inactivo' }}
          </span>
        </div>
      </div>

      <!-- Accesos rápidos -->
      <div class="grid grid-cols-2 gap-3">
        <a
          [routerLink]="['campaigns']"
          class="flex items-center gap-3 p-4 border border-slate-200 rounded-lg hover:border-blue-300 hover:bg-blue-50/30 transition group"
        >
          <div class="w-9 h-9 rounded-lg bg-blue-50 flex items-center justify-center group-hover:bg-blue-100 transition shrink-0">
            <svg class="w-5 h-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 110-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38c-.551.318-1.26.117-1.527-.461a20.845 20.845 0 01-1.44-4.282m3.102.069a18.03 18.03 0 01-.59-4.59c0-1.586.205-3.124.59-4.59m0 9.18a23.848 23.848 0 018.835 2.535M10.34 6.66a23.847 23.847 0 008.835-2.535m0 0A23.74 23.74 0 0018.795 3m.38 1.125a23.91 23.91 0 011.014 5.395m-1.014 8.855c-.118.38-.245.754-.38 1.125m.38-1.125a23.91 23.91 0 001.014-5.395m0-3.46c.495.413.811 1.035.811 1.73 0 .695-.316 1.317-.811 1.73m0-3.46a24.347 24.347 0 010 3.46" />
            </svg>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-900">Campañas</p>
            <p class="text-xs text-slate-400">Gestionar campañas</p>
          </div>
        </a>

        <a
          [routerLink]="['kiosks']"
          class="flex items-center gap-3 p-4 border border-slate-200 rounded-lg hover:border-blue-300 hover:bg-blue-50/30 transition group"
        >
          <div class="w-9 h-9 rounded-lg bg-blue-50 flex items-center justify-center group-hover:bg-blue-100 transition shrink-0">
            <svg class="w-5 h-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0H3" />
            </svg>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-900">Kioscos</p>
            <p class="text-xs text-slate-400">Gestionar dispositivos</p>
          </div>
        </a>
      </div>
    </div>
  }
</div>
