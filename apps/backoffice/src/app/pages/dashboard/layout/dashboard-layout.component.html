<div class="h-screen w-full overflow-hidden flex bg-[#F8FAFC]">

  <!-- Sidebar -->
  <aside class="w-64 bg-[#0F172A] flex flex-col shrink-0">

    <!-- Marca -->
    <div class="p-5 border-b border-slate-800">
      <span class="text-white font-bold text-lg">Kiosco System</span>
    </div>

    <!-- ── Sección 1: Tenant activo + selector ── -->
    <div class="px-3 py-3 border-b border-slate-800 relative">
      <p class="text-xs text-slate-500 uppercase tracking-wider px-2 mb-2">Tenant</p>

      <!-- Trigger del dropdown -->
      <button
        (click)="toggleDropdown()"
        class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-800 transition text-left"
      >
        @if (activeTenant()) {
          @if (activeTenant()!.logoUrl) {
            <img
              [src]="activeTenant()!.logoUrl"
              [alt]="activeTenant()!.name"
              class="w-7 h-7 rounded-full object-cover border border-slate-700 shrink-0"
            />
          } @else {
            <div class="w-7 h-7 rounded-full bg-slate-700 flex items-center justify-center text-white text-xs font-bold shrink-0">
              {{ activeTenant()!.name.charAt(0).toUpperCase() }}
            </div>
          }
          <span class="flex-1 text-sm font-medium text-white truncate">{{ activeTenant()!.name }}</span>
        } @else {
          <div class="w-7 h-7 rounded-full bg-slate-800 border border-dashed border-slate-600 shrink-0"></div>
          <span class="flex-1 text-sm text-slate-500">Seleccionar tenant</span>
        }
        <!-- Chevron -->
        <svg
          class="w-4 h-4 text-slate-500 shrink-0 transition-transform"
          [class.rotate-180]="showDropdown()"
          fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
        </svg>
      </button>

      <!-- Dropdown -->
      @if (showDropdown()) {
        <!-- Backdrop -->
        <div class="fixed inset-0 z-10" (click)="closeDropdown()"></div>

        <div class="absolute left-3 right-3 top-full mt-1 z-20 bg-slate-800 border border-slate-700 rounded-lg shadow-lg overflow-hidden">
          @if (tenants().length === 0) {
            <p class="text-xs text-slate-500 text-center py-4">Sin tenants registrados</p>
          } @else {
            @for (tenant of tenants(); track tenant.id) {
              <button
                (click)="selectTenant(tenant)"
                class="w-full flex items-center gap-3 px-3 py-2.5 hover:bg-slate-700 transition text-left"
                [class.bg-slate-700]="tenant.id === activeTenant()?.id"
              >
                @if (tenant.logoUrl) {
                  <img [src]="tenant.logoUrl" [alt]="tenant.name" class="w-6 h-6 rounded-full object-cover shrink-0" />
                } @else {
                  <div class="w-6 h-6 rounded-full bg-slate-600 flex items-center justify-center text-white text-xs font-bold shrink-0">
                    {{ tenant.name.charAt(0).toUpperCase() }}
                  </div>
                }
                <span class="text-sm text-slate-200 truncate">{{ tenant.name }}</span>
                @if (tenant.id === activeTenant()?.id) {
                  <svg class="w-4 h-4 text-blue-400 ml-auto shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                  </svg>
                }
              </button>
            }
          }
        </div>
      }
    </div>

    <!-- ── Sección 2: Navegación ── -->
    <nav class="flex-1 p-3 space-y-1">

      <a
        [routerLink]="activeTenant() ? ['/dashboard/tenants', activeTenant()!.id] : null"
        routerLinkActive="bg-blue-600 text-white shadow"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition"
        [class]="activeTenant()
          ? 'text-slate-400 hover:bg-slate-800 cursor-pointer'
          : 'text-slate-600 cursor-not-allowed'"
      >
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.375 19.5h17.25m-17.25 0a1.125 1.125 0 01-1.125-1.125M3.375 19.5h1.5C5.496 19.5 6 18.996 6 18.375m-3.75.125v-11.25A1.125 1.125 0 013.375 6h17.25a1.125 1.125 0 011.125 1.125v11.25m-18.375.125c0 .621.504 1.125 1.125 1.125m0 0h17.25M6 18.375V6m0 12.375c0 .621.504 1.125 1.125 1.125H18.75a1.125 1.125 0 001.125-1.125V6" />
        </svg>
        Resumen
      </a>

      <a
        [routerLink]="activeTenant() ? ['/dashboard/tenants', activeTenant()!.id, 'campaigns'] : null"
        routerLinkActive="bg-blue-600 text-white shadow"
        [routerLinkActiveOptions]="{ exact: false }"
        class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition"
        [class]="activeTenant()
          ? 'text-slate-400 hover:bg-slate-800 cursor-pointer'
          : 'text-slate-600 cursor-not-allowed'"
      >
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 110-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38c-.551.318-1.26.117-1.527-.461a20.845 20.845 0 01-1.44-4.282m3.102.069a18.03 18.03 0 01-.59-4.59c0-1.586.205-3.124.59-4.59m0 9.18a23.848 23.848 0 018.835 2.535M10.34 6.66a23.847 23.847 0 008.835-2.535m0 0A23.74 23.74 0 0018.795 3m.38 1.125a23.91 23.91 0 011.014 5.395m-1.014 8.855c-.118.38-.245.754-.38 1.125m.38-1.125a23.91 23.91 0 001.014-5.395m0-3.46c.495.413.811 1.035.811 1.73 0 .695-.316 1.317-.811 1.73m0-3.46a24.347 24.347 0 010 3.46" />
        </svg>
        Campañas
      </a>

      <a
        [routerLink]="activeTenant() ? ['/dashboard/tenants', activeTenant()!.id, 'kiosks'] : null"
        routerLinkActive="bg-blue-600 text-white shadow"
        [routerLinkActiveOptions]="{ exact: false }"
        class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition"
        [class]="activeTenant()
          ? 'text-slate-400 hover:bg-slate-800 cursor-pointer'
          : 'text-slate-600 cursor-not-allowed'"
      >
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0H3" />
        </svg>
        Kioscos
      </a>

    </nav>

    <!-- ── Footer ── -->
    <div class="p-3 border-t border-slate-800 flex flex-col gap-1">
      <a
        routerLink="/dashboard/tenants"
        routerLinkActive="bg-slate-800 text-white"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-slate-400 hover:bg-slate-800 transition"
      >
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21" />
        </svg>
        Todos los tenants
      </a>
      <a
        routerLink="/dashboard/profile"
        routerLinkActive="bg-slate-800 text-white"
        class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-slate-400 hover:bg-slate-800 transition"
      >
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
        </svg>
        Mi perfil
      </a>
    </div>

  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <router-outlet />
  </div>

</div>
